name: Refresh README (No Contribution Impact)

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout automation branch  # ← checkout the SIDE branch
        uses: actions/checkout@v3
        with:
          ref: feature/automation-no-merge
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update timestamp
        run: echo "Last refresh: $(date -u)" > refresh.txt

      - name: Commit and push to side branch only
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add refresh.txt
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: auto refresh [skip ci]"
          git push origin feature/automation-no-merge
